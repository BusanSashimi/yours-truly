# nginx site for yours-truly — SSR web (:3000) + Fastify API (:4000), HTTPS-first.
# Install as /etc/nginx/sites-available/yours-truly (symlinked from sites-enabled).
# Replaces the previous static-export config: `/` and `/_next/` now proxy to
# `next start`, and `/api/` proxies to the API.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name yourstruly.it www.yourstruly.it 44.197.95.242;

    # Let's Encrypt HTTP-01 challenges must not be redirected.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name yourstruly.it www.yourstruly.it 44.197.95.242;

    ssl_certificate /etc/letsencrypt/live/yourstruly.it/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/yourstruly.it/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # API -> Fastify. `location /api/` + path-less proxy_pass preserves the full
    # /api/... path, which matches the routes registered under /api in the app.
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js build assets are content-hashed and immutable.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else -> Next.js SSR.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
