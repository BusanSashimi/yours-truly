# nginx site for yours-truly — canonical host: www.yourstruly.it.
# Install as /etc/nginx/sites-available/yours-truly (symlinked from sites-enabled).
#
# Canonicalizing on ONE host is load-bearing for auth, not cosmetics: Better
# Auth cookies are host-only (no Domain attribute), so an OAuth state cookie or
# session set on the apex is invisible on www. The Naver callback is registered
# on www — flows started from the apex failed state verification (observed live
# 2026-06-12: 302 -> /api/auth/error?error=state_mismatch). See
# docs/canonical-www-cutover.md for the cutover runbook.
#
# Three servers:
#   :80  all names + bare IP → ACME carve-out (webroot renewal), else 301 www
#   :443 apex + bare IP      → 301 www (apex must STAY on the cert: the
#                              redirect itself is served over TLS)
#   :443 www                 → the app (/ → next :3000, /api/ → fastify :4000)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name yourstruly.it www.yourstruly.it 44.197.95.242;

    # Let's Encrypt HTTP-01 challenges must never be redirected. Certbot renews
    # via webroot against /var/www/html (switched from standalone at cutover).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://www.yourstruly.it$request_uri;
    }
}

# Apex (and bare-IP) HTTPS → canonical www, single hop. A `listen 443 ssl`
# block must carry its own certificate directives or nginx -t fails.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name yourstruly.it 44.197.95.242;

    ssl_certificate /etc/letsencrypt/live/yourstruly.it/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/yourstruly.it/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    return 301 https://www.yourstruly.it$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.yourstruly.it;

    ssl_certificate /etc/letsencrypt/live/yourstruly.it/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/yourstruly.it/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # API -> Fastify. `location /api/` + path-less proxy_pass preserves the full
    # /api/... path, which matches the routes registered under /api in the app.
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js build assets are content-hashed and immutable.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else -> Next.js SSR.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
